<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local test web</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --fg: #e7e9ea;
        --muted: #8b98a5;
        --accent: #1d9bf0;
        --card: #16181c;
        --border: #2f3336;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f9f9;
          --fg: #0f1419;
          --muted: #536471;
          --accent: #1d9bf0;
          --card: #fff;
          --border: #cfd9de;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      main {
        max-width: 36rem;
        margin: 0 auto;
        padding: 2rem 1.25rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 0.35rem;
        color: var(--muted);
      }
      input[type="text"] {
        width: 100%;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        font-size: 1rem;
      }
      button {
        margin-top: 0.75rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.08);
      }
      #out {
        margin-top: 0.75rem;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ok {
        color: #00ba7c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Local test web</h1>
      <p>
        Static page served from <code>local-web-test/</code>. Use this to verify
        the browser, network, or tooling without starting Expo.
      </p>

      <div class="card">
        <label for="msg">Echo (client-only)</label>
        <input id="msg" type="text" placeholder="Type something…" value="Hello" />
        <button type="button" id="go">Run</button>
        <div id="out" class="ok" aria-live="polite"></div>
      </div>

      <div class="card">
        <p style="margin: 0; font-size: 0.875rem">
          <strong>Full app (Expo web):</strong>
          <code>npm run web</code>
        </p>
      </div>
    </main>
    <script>
      const msg = document.getElementById("msg");
      const out = document.getElementById("out");
      document.getElementById("go").addEventListener("click", () => {
        const t = new Date().toISOString();
        out.textContent = "[" + t + "] You typed: " + (msg.value || "(empty)");
      });
    </script>
  </body>
</html>
