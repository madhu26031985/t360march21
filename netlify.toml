[build]
  command = "npm run build:web"
  publish = "dist"

# Supabase anon key is public-by-design (RLS protects data). Disable scan for this project.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
  EXPO_PUBLIC_SUPABASE_WEB_URL = "https://chtkcretrpygqmwtyonx.supabase.co"
  # Agenda share URLs: same host as native default in lib/agendaWebLink.ts
  EXPO_PUBLIC_AGENDA_WEB_HOST = "https://app.t360.in"

# Public agenda: /{club-segment}/agenda/{meetingNo}/{meetingId} (slug or legacy UUID; no /weblogin in shared URL)
[[redirects]]
  from = "/:clubId/agenda/:meetingNo/:meetingId"
  to = "/.netlify/functions/agenda-preview?meetingId=:meetingId&brand=:clubId&meetingNo=:meetingNo&mode=agenda"
  status = 200

# Short public agenda: /a/{meetingId}
[[redirects]]
  from = "/a/:meetingId"
  to = "/.netlify/functions/agenda-preview?meetingId=:meetingId"
  status = 200

# Keep already-prefixed short links stable (avoid matching branded rule below).
[[redirects]]
  from = "/weblogin/a/:meetingId"
  to = "/weblogin/a/:meetingId"
  status = 200

# Branded short agenda: /{club-slug}/a/{meetingId}
[[redirects]]
  from = "/:brand/a/:meetingId"
  to = "/.netlify/functions/agenda-preview?meetingId=:meetingId&brand=:brand"
  status = 200

# Root → app lives under /weblogin (Expo baseUrl)
[[redirects]]
  from = "/"
  to = "/weblogin/"
  status = 302

# SPA routing for /weblogin
[[redirects]]
  from = "/weblogin"
  to = "/weblogin/"
  status = 301

[[redirects]]
  from = "/weblogin/*"
  to = "/weblogin/index.html"
  status = 200

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
