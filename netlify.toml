[build]
  command = "npm run build:web"
  publish = "dist"

# sharp uses native bindings; do not bundle into the function zip incorrectly.
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]
  included_files = ["assets/images/icon.png"]

# Supabase anon key is public-by-design (RLS protects data). Disable scan for this project.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
  EXPO_PUBLIC_SUPABASE_WEB_URL = "https://chtkcretrpygqmwtyonx.supabase.co"
  # Agenda share URLs: same host as native default in lib/agendaWebLink.ts
  EXPO_PUBLIC_AGENDA_WEB_HOST = "https://app.t360.in"

# Public agenda: /{club-segment}/agenda/{meetingNo}/{meetingId} (slug or legacy UUID; no /weblogin in shared URL)
[[redirects]]
  from = "/:clubId/agenda/:meetingNo/:meetingId"
  to = "/.netlify/functions/agenda-preview/agenda/:clubId/:meetingNo/:meetingId?mode=agenda"
  status = 200

# Short public agenda: /a/{meetingId}
[[redirects]]
  from = "/a/:meetingId"
  to = "/.netlify/functions/agenda-preview/short/:meetingId"
  status = 200

# Branded short agenda: /{club-slug}/a/{meetingId}
[[redirects]]
  from = "/:brand/a/:meetingId"
  to = "/.netlify/functions/agenda-preview/brand/:brand/:meetingId"
  status = 200

# Public agenda under /weblogin (many share URLs) — SSR Open Graph + redirect to same path in SPA
[[redirects]]
  from = "/weblogin/:club/agenda/:meetingNo/:meetingId"
  to = "/.netlify/functions/agenda-preview/agenda/:club/:meetingNo/:meetingId?mode=agenda"
  status = 200

[[redirects]]
  from = "/weblogin/:brand/a/:meetingId"
  to = "/.netlify/functions/agenda-preview/brand/:brand/:meetingId"
  status = 200

[[redirects]]
  from = "/weblogin/a/:meetingId"
  to = "/.netlify/functions/agenda-preview/short/:meetingId"
  status = 200

# Root → app lives under /weblogin (Expo baseUrl)
[[redirects]]
  from = "/"
  to = "/weblogin/"
  status = 302

# SPA routing for /weblogin
[[redirects]]
  from = "/weblogin"
  to = "/weblogin/index.html"
  status = 200

[[redirects]]
  from = "/weblogin/*"
  to = "/weblogin/index.html"
  status = 200

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/og-images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
