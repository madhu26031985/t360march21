[build]
  command = "npm run build:web"
  publish = "dist"

# Root → app lives under /weblogin (Expo baseUrl)
[[redirects]]
  from = "/"
  to = "/weblogin/"
  status = 302

# SPA routing for /weblogin
[[redirects]]
  from = "/weblogin"
  to = "/weblogin/"
  status = 301

[[redirects]]
  from = "/weblogin/*"
  to = "/weblogin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
